<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Door Lock</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        .status {
            font-size: 1.5rem;
            margin: 20px;
            padding: 10px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .open {
            background-color: #28a745;
        }

        .close {
            background-color: #dc3545;
        }
    </style>
</head>

<body>

<!--
================================================================================
DEVELOPER NOTE: HTML FILE FOR SMART DOOR LOCK SYSTEM
================================================================================

This HTML file is OPTIONAL and is created for better code organization.

Currently, in the original project:
- HTML is written inside main.py as a string.
- Raspberry Pi Pico sends that HTML directly.

WHY THIS FILE EXISTS:
- To separate UI (HTML) from backend logic (Python)
- To make the project cleaner and more modular
- To improve readability and maintainability

--------------------------------------------------------------------------------
IF YOU WANT TO USE THIS HTML FILE (OPTIONAL MODIFICATION)
--------------------------------------------------------------------------------

Your current main.py likely has this function:

    def webpage(state):
        return f""" ... HTML CODE ... """

And inside serve() function:

    response = webpage(state)

--------------------------------------------------------------------------------
TO USE THIS HTML FILE, DO THE FOLLOWING CHANGES IN main.py:
--------------------------------------------------------------------------------

1️⃣ ADD THIS FUNCTION (place ABOVE serve() function):

    def load_html(filename, state):
        with open(filename, 'r') as file:
            html = file.read()
            return html.replace("{state}", state)

------------------------------------------------------------

2️⃣ FIND THIS LINE inside serve():

    response = webpage(state)

------------------------------------------------------------

3️⃣ REPLACE IT WITH:

    response = load_html("index.html", state)

------------------------------------------------------------

4️⃣ OPTIONAL (CLEAN CODE):

    You can REMOVE the old webpage() function completely.

------------------------------------------------------------

IMPORTANT NOTES:
- Place index.html in the SAME folder as main.py
- "{state}" is dynamically replaced by Python
- If not replaced, it will show as plain text

--------------------------------------------------------------------------------
CURRENT STATUS:
--------------------------------------------------------------------------------
✔ Your original Python code will still work WITHOUT this file
✔ This file is only for modular structure and improvement

================================================================================
-->

<div class="container">
    <h1>🔐 Smart Door Lock System</h1>

    <div class="status">
        Door Status: <strong>{state}</strong>
    </div>

    <form action="/DoorOpen">
        <button class="btn open" type="submit">🚪 Open Door</button>
    </form>

    <form action="/DoorClose">
        <button class="btn close" type="submit">🔒 Close Door</button>
    </form>
</div>

</body>
</html>
